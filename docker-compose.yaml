services:
  isaac-sim:
    build:
      context: .
      dockerfile: Dockerfile
    image: isaac-sim-stream:5.1.0
    container_name: isaac-sim
    runtime: nvidia
    network_mode: host
    shm_size: "32gb"
    environment:
      ACCEPT_EULA: "Y"

      # === Streaming defaults ===
      SIGNAL_PORT: "49100"
      STREAM_PORT: "47998"
      WIDTH: "2560"
      HEIGHT: "1440"

      # PUBLIC_IP:
      # - 내부망 접속이면 보통 비워둬도 되지만, NAT/다중 NIC 환경이면 명시 권장
      # - 내부망 예: "192.168.0.10"
      # - 외부망 예: 공인 IP
      # PUBLIC_IP: ""

    volumes:
      - ./volumes/cache:/root/.cache
      - ./volumes/data:/root/.local/share/ov
      - ./volumes/logs:/root/.nvidia-omniverse/logs

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]